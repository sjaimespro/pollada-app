<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f6f9;
}

.header {
  background: #1f7a63;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  padding: 10px;
  max-width: 600px;
  margin: auto;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 15px;
  box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
}

input {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.map {
  height: 200px;
  margin-top: 8px;
  border-radius: 10px;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 10px;
  margin-top: 5px;
  font-size: 14px;
}

.save { background:#1f7a63; color:white; }
.delete { background:red; color:white; }
.add { background:#007bff; color:white; }
.upload { background:#ff9800; color:white; }
</style>
</head>

<body>

<div class="header">
  <h2>⚙️ Panel Admin PRO</h2>
</div>

<div class="container">

<input type="file" id="file">
<button class="upload" onclick="subir()">📂 Subir Excel</button>

<hr>

<div id="lista"></div>

<button class="add" onclick="agregar()">➕ Agregar Pedido</button>

</div>

<script>
let datos = [];
let maps = [];

async function cargar() {
  const res = await fetch("/data");
  datos = await res.json();
  render();
}

function render() {
  const cont = document.getElementById("lista");
  cont.innerHTML = "";
  maps = [];

  datos.forEach((d, i) => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <input value="${d.nombre}" onchange="datos[${i}].nombre=this.value">
      <input type="number" value="${d.cantidad}" onchange="datos[${i}].cantidad=this.value">
      <input placeholder="lat,lng" value="${d.lugar}" onchange="datos[${i}].lugar=this.value">
      <input value="${d.hora}" onchange="datos[${i}].hora=this.value">

      <div id="map${i}" class="map"></div>

      <button class="save" onclick="guardar()">💾 Guardar</button>
      <button class="delete" onclick="eliminar(${i})">🗑️ Eliminar</button>
    `;

    cont.appendChild(div);

    setTimeout(() => initMap(i, d.lugar), 200);
  });
}

function initMap(i, lugar) {
  let lat = -12.0464;
  let lng = -77.0428;

  if (lugar && lugar.includes(",")) {
    const parts = lugar.split(",");
    lat = parseFloat(parts[0]);
    lng = parseFloat(parts[1]);
  }

  const map = new google.maps.Map(document.getElementById("map"+i), {
    center: { lat, lng },
    zoom: 14,
  });

  const marker = new google.maps.Marker({
    position: { lat, lng },
    map: map,
    draggable: true
  });

  map.addListener("click", (e) => {
    const newLat = e.latLng.lat();
    const newLng = e.latLng.lng();

    marker.setPosition(e.latLng);
    datos[i].lugar = `${newLat},${newLng}`;
  });

  marker.addListener("dragend", (e) => {
    datos[i].lugar = `${e.latLng.lat()},${e.latLng.lng()}`;
  });

  maps.push(map);
}

async function guardar() {
  await fetch("/update", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(datos)
  });

  alert("Guardado ✅");
}

function eliminar(i) {
  datos.splice(i,1);
  render();
}

function agregar() {
  datos.push({
    nombre: "nuevo",
    cantidad: 1,
    lugar: "-12.0464,-77.0428",
    hora: "12:00"
  });
  render();
}

async function subir() {
  const file = document.getElementById("file").files[0];
  const formData = new FormData();
  formData.append("file", file);

  await fetch("/upload", {
    method: "POST",
    body: formData
  });

  cargar();
}

cargar();
</script>

<!-- ✅ API GOOGLE MAPS -->
<script src="https://maps.googleapis.com/maps/api/js?key=TU_API_KEY"></script>

</body>
</html>
