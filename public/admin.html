<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f4f6f9;
}

.header {
  background:#1f7a63;
  color:white;
  padding:15px;
  text-align:center;
}

.container {
  padding:10px;
  max-width:600px;
  margin:auto;
}

.card {
  background:white;
  padding:10px;
  border-radius:10px;
  margin-bottom:15px;
}

input {
  width:100%;
  padding:8px;
  margin:5px 0;
}

.map {
  height:200px;
  margin-top:8px;
  border-radius:10px;
}

button {
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:5px;
}

.save { background:#1f7a63; color:white; }
.delete { background:red; color:white; }
.add { background:#007bff; color:white; }
.upload { background:#ff9800; color:white; }
</style>
</head>

<body>

<div class="header">
<h2>⚙️ Admin PRO (Mapa libre)</h2>
</div>

<div class="container">

<input type="file" id="file">
<button class="upload" onclick="subir()">📂 Subir Excel</button>

<hr>

<div id="lista"></div>

<button class="add" onclick="agregar()">➕ Agregar Pedido</button>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let datos = [];

async function cargar() {
  const res = await fetch("/data");
  datos = await res.json();
  render();
}

function render() {
  const cont = document.getElementById("lista");
  cont.innerHTML = "";

  datos.forEach((d, i) => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <input value="${d.nombre}" onchange="datos[${i}].nombre=this.value">
      <input type="number" value="${d.cantidad}" onchange="datos[${i}].cantidad=this.value">
      <input placeholder="lat,lng" value="${d.lugar}" onchange="datos[${i}].lugar=this.value">
      <input value="${d.hora}" onchange="datos[${i}].hora=this.value">

      <div id="map${i}" class="map"></div>

      <button class="save" onclick="guardar()">💾 Guardar</button>
      <button class="delete" onclick="eliminar(${i})">🗑️ Eliminar</button>
    `;

    cont.appendChild(div);

    setTimeout(() => crearMapa(i, d.lugar), 100);
  });
}

function crearMapa(i, lugar) {

  let lat = -12.0464;
  let lng = -77.0428;

  if (lugar && lugar.includes(",")) {
    const p = lugar.split(",");
    lat = parseFloat(p[0]);
    lng = parseFloat(p[1]);
  }

  const map = L.map("map"+i).setView([lat, lng], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'OpenStreetMap'
  }).addTo(map);

  const marker = L.marker([lat, lng], {draggable:true}).addTo(map);

  map.on("click", function(e){
    const {lat, lng} = e.latlng;
    marker.setLatLng(e.latlng);
    datos[i].lugar = `${lat},${lng}`;
  });

  marker.on("dragend", function(e){
    const pos = e.target.getLatLng();
    datos[i].lugar = `${pos.lat},${pos.lng}`;
  });
}

async function guardar() {
  await fetch("/update", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(datos)
  });
  alert("Guardado ✅");
}

function eliminar(i) {
  datos.splice(i,1);
  render();
}

function agregar() {
  datos.push({
    nombre:"nuevo",
    cantidad:1,
    lugar:"-12.0464,-77.0428",
    hora:"12:00"
  });
  render();
}

async function subir() {
  const file = document.getElementById("file").files[0];
  const formData = new FormData();
  formData.append("file", file);

  await fetch("/upload", {
    method:"POST",
    body:formData
  });

  cargar();
}

cargar();
</script>

</body>
</html>
