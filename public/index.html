<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ruta de Entregas</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f6f9;
}

/* HEADER */
.header {
  background: #1f7a63;
  color: white;
  padding: 15px;
}

.header h3 {
  margin: 0;
}

/* KPIs */
.kpis {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.kpi {
  flex: 1 1 30%;
  background: #2c8c72;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  font-size: 14px;
}

.kpi span {
  display: block;
  font-size: 18px;
  font-weight: bold;
}

/* CONTENEDOR */
.container {
  padding: 10px;
}

/* CARD */
.card {
  background: white;
  border-radius: 15px;
  padding: 12px;
  margin-bottom: 12px;
  box-shadow: 0px 2px 6px rgba(0,0,0,0.1);
}

/* HEADER CARD */
.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.name {
  font-weight: bold;
  font-size: 16px;
}

.badge {
  background: #d1f2eb;
  padding: 5px 8px;
  border-radius: 8px;
  font-size: 12px;
}

/* INFO */
.info {
  margin-top: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* BOTONES */
.btn {
  padding: 10px;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
}

/* Waze */
.waze {
  background: #33b5e5;
  color: white;
  font-size: 16px;
}

/* ENTREGAR */
.entregar {
  width: 100%;
  margin-top: 10px;
  background: #1f7a63;
  color: white;
  font-size: 16px;
  padding: 12px;
}

/* ENTREGADO */
.entregado {
  background: #c8e6c9;
}

/* RESPONSIVE MEJORADO */
@media (min-width: 600px) {
  .container {
    max-width: 600px;
    margin: auto;
  }
}
</style>
</head>

<body>

<div class="header">
  <h3>🚚 Ruta de Entregas</h3>

  <div class="kpis">
    <div class="kpi">
      <span id="totalPedidos">0</span>
      Pedidos
    </div>
    <div class="kpi">
      <span id="totalCantidad">0</span>
      Porciones
    </div>
    <div class="kpi">
      <span id="pendientes">0</span>
      Pendientes
    </div>
  </div>
</div>

<div class="container" id="lista"></div>

<script>
function formatearHora(hora) {
  if (!hora) return "";

  // Si Excel lo convirtió en decimal
  if (typeof hora === "number") {
    let h = Math.floor(hora * 24);
    let m = Math.round((hora * 24 - h) * 60);
    return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
  }

  return hora;
}

async function cargar() {
  const res = await fetch("/data");
  const data = await res.json();

  const cont = document.getElementById("lista");
  cont.innerHTML = "";

  let totalCantidad = 0;
  let pendientes = 0;

  data.forEach((r, i) => {

    totalCantidad += r.cantidad;
    if (!r.entregado) pendientes++;

    const div = document.createElement("div");
    div.className = "card";
    if (r.entregado) div.classList.add("entregado");

    div.innerHTML = `
      <div class="top">
        <div>
          <div class="name">${i+1}. ${r.nombre}</div>
          <small>Entrega programada</small>
        </div>
        <div class="badge">${formatearHora(r.hora)}</div>
      </div>

      <div class="info">
        <span>🍗 ${r.cantidad}</span>
        <a href="https://waze.com/ul?url=${r.lugar}" target="_lass="btn waze">📍</button>
        </a>
      </div>

      ${
        r.entregado
        ? `<button class="btn entregar">✅ Entregado</button>`
        : `<button class="btn entregar" onclick="entregar(${r.id})">Marcar como entregado</button>`
      }
    `;

    cont.appendChild(div);
  });

  document.getElementById("totalPedidos").innerText = data.length;
  document.getElementById("totalCantidad").innerText = totalCantidad;
  document.getElementById("pendientes").innerText = pendientes;
}

async function entregar(id) {
  await fetch(`/entregado/${id}`, { method:"POST" });
  cargar();
}

cargar();
setInterval(cargar, 5000);
</script>

</body>
</html>
